- name: install package
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: install packages
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
    - { name: "nginx" , state: "absent" }
    - { name: "mysql" , state: "present" }
    - { name: "zip" , state: "present" }