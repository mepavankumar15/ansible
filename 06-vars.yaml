- name: print username and password
  hosts: local
  connection: local
  vars_prompt:
  - name: username
    prompt: enter your name
    private: false

  - name: password
    prompt: enter your password
    private: true
  
  tasks:
  - name: print info
    ansible.builtin.debug:
      msg: "username is: {{ username }}, password is: {{ password }}"